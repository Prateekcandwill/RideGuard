<!DOCTYPE html>
<html lang="en">
<head>

<title>RideGuard — IndusInd Insurance Prototype</title>

<!-- React + ReactDOM -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<!-- Babel standalone, lets us write JSX directly in the browser -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<!-- Lucide icon data (vanilla build) — we wrap these as React icon components below -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" crossorigin></script>

<style>
  html, body { margin: 0; padding: 0; background: #EAE5E2; }

  button { font-family: inherit; }

<body>
<div id="root"></div>

<script type="text/babel-source" id="app-source">
const { useState, createContext, useContext } = React;

// ============================================================
// ICONS — thin React wrappers around Lucide's icon path data,
// exposing the same API surface (size, color, strokeWidth, style, opacity)
// that lucide-react components provide.
// ============================================================
function makeIcon(name) {
  return function LucideIconWrapper({ size = 24, color = "currentColor", strokeWidth = 2, style = {}, opacity, ...rest }) {
    const node = (window.lucide && window.lucide.icons && window.lucide.icons[name]) || [];
    return React.createElement(
      "svg",
      {
        xmlns: "http://www.w3.org/2000/svg",
        width: size,
        height: size,
        viewBox: "0 0 24 24",
        fill: "none",
        stroke: color,
        strokeWidth: strokeWidth,
        strokeLinecap: "round",
        strokeLinejoin: "round",
        style: { opacity, flexShrink: 0, ...style },
        ...rest,
      },
      node.map((n, i) => React.createElement(n[0], { key: i, ...n[1] }))
    );
  };
}

const Home = makeIcon("Home");
const FileText = makeIcon("FileText");
const Bell = makeIcon("Bell");
const User = makeIcon("User");
const ChevronRight = makeIcon("ChevronRight");
const ChevronLeft = makeIcon("ChevronLeft");
const Camera = makeIcon("Camera");
const MapPin = makeIcon("MapPin");
const Shield = makeIcon("Shield");
const Zap = makeIcon("Zap");
const CheckCircle2 = makeIcon("CheckCircle2");
const AlertTriangle = makeIcon("AlertTriangle");
const Bike = makeIcon("Bike");
const Wallet = makeIcon("Wallet");
const Calendar = makeIcon("Calendar");
const Sparkles = makeIcon("Sparkles");
const ShieldCheck = makeIcon("ShieldCheck");
const Video = makeIcon("Video");
const FolderLock = makeIcon("FolderLock");
const Award = makeIcon("Award");
const Phone = makeIcon("Phone");
const ChevronDown = makeIcon("ChevronDown");

// ============================================================
// THEME — IndusInd Insurance brand system (maroon / gold / cream)
// ============================================================
const theme = {
  primary: "#A6192E",
  primaryDark: "#7A0F20",
  primaryTint: "#FBEAEC",
  gold: "#C9962C",
  goldTint: "#FBF2E0",
  bg: "#F7F5F3",
  card: "#FFFFFF",
  border: "#ECE3E1",
  ink: "#20201F",
  textSecondary: "#6B6560",
  textMuted: "#9C948F",
  success: "#1E8E5A",
  successTint: "#E8F5EE",
  danger: "#C0392B",
  dangerTint: "#FBEAEA",
  fontDisplay: "'Georgia', 'Times New Roman', serif",
  fontBody: "'Segoe UI', Roboto, Arial, sans-serif",
  radiusLg: 20,
  radiusMd: 14,
  radiusSm: 10,
};
const ThemeCtx = createContext(theme);
const useTheme = () => useContext(ThemeCtx);

function PhoneFrame({ children }) {
  return (
    <div style={{ display: "flex", justifyContent: "center", alignItems: "flex-start", padding: "24px 12px", background: "#EAE5E2", minHeight: "100%" }}>
      <div style={{ width: 380, height: 800, borderRadius: 44, background: "#111", padding: 10, boxShadow: "0 30px 70px rgba(0,0,0,0.3)", position: "relative" }}>
        <div style={{ width: "100%", height: "100%", borderRadius: 34, background: theme.bg, overflow: "hidden", position: "relative", display: "flex", flexDirection: "column" }}>
          <div style={{ position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)", width: 130, height: 24, background: "#111", borderRadius: "0 0 16px 16px", zIndex: 50 }} />
          {children}
        </div>
      </div>
    </div>
  );
}

function StatusBar() {
  const t = useTheme();
  return (
    <div style={{ height: 34, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 24px", fontSize: 12, fontWeight: 600, color: t.ink, flexShrink: 0 }}>
      <span>9:41</span>
      <span style={{ letterSpacing: 1, color: t.textSecondary }}>●●●● 5G 100%</span>
    </div>
  );
}

function Logo({ size = 15, on = "light" }) {
  const t = useTheme();
  const fg = on === "light" ? t.ink : "#fff";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <div style={{ width: size + 10, height: size + 10, borderRadius: 8, background: t.primary, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
        <ShieldCheck size={size} color="#fff" strokeWidth={2.3} />
      </div>
      <div style={{ lineHeight: 1.05 }}>
        <div style={{ fontFamily: t.fontDisplay, fontWeight: 700, fontSize: size, color: fg }}>RideGuard</div>
        <div style={{ fontSize: 8.5, color: t.textMuted, letterSpacing: 0.6, textTransform: "uppercase" }}>by IndusInd Insurance</div>
      </div>
    </div>
  );
}

function TopBar({ title, eyebrow, onBack, plain }) {
  const t = useTheme();
  if (plain) {
    return (
      <div style={{ padding: "10px 18px 4px", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
        <Logo />
        <button style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 10, width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
          <Bell size={16} color={t.ink} />
        </button>
      </div>
    );
  }
  return (
    <div style={{ padding: "8px 18px 14px", flexShrink: 0 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: title ? 14 : 0 }}>
        {onBack && (
          <button onClick={onBack} style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 10, width: 32, height: 32, padding: 0, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <ChevronLeft size={18} color={t.ink} />
          </button>
        )}
        <Logo size={13} />
      </div>
      {title && (
        <div>
          {eyebrow && <div style={{ fontSize: 10.5, fontWeight: 700, color: t.primary, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>{eyebrow}</div>}

        </div>
      )}
    </div>

}

function BottomNav({ active, go }) {
  const t = useTheme();
  const items = [
    { id: "home", icon: Home, label: "Home" },
    { id: "claims", icon: FileText, label: "Claims" },
    { id: "locator", icon: MapPin, label: "Locator" },
    { id: "vault", icon: FolderLock, label: "E-Doc" },
    { id: "profile", icon: User, label: "Profile" },
  ];
  return (
    <div style={{ display: "flex", background: t.card, borderTop: `1px solid ${t.border}`, flexShrink: 0, paddingBottom: 8, paddingTop: 6 }}>
      {items.map((it) => {
        const isActive = active === it.id;
        return (
          <button key={it.id} onClick={() => go(it.id)} style={{ flex: 1, background: "none", border: "none", padding: "6px 0 2px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
            <it.icon size={18} color={isActive ? t.primary : t.textMuted} strokeWidth={isActive ? 2.4 : 2} />
            <span style={{ fontSize: 9, color: isActive ? t.primary : t.textMuted, fontWeight: isActive ? 700 : 500 }}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function Pill({ children, tone = "primary" }) {
  const t = useTheme();
  const map = {
    primary: { bg: t.primaryTint, col: t.primaryDark },
    gold: { bg: t.goldTint, col: "#8a6a1a" },
    success: { bg: t.successTint, col: t.success },
    danger: { bg: t.dangerTint, col: t.danger },
    neutral: { bg: t.border, col: t.textSecondary },
  };
  const c = map[tone] || map.primary;
  return (
    <span style={{ background: c.bg, color: c.col, fontSize: 10.5, fontWeight: 700, padding: "4px 10px", borderRadius: 20, display: "inline-block" }}>
      {children}
    </span>
  );
}

function Card({ children, style = {}, onClick, highlight }) {
  const t = useTheme();
  return (
    <div onClick={onClick} style={{
      background: t.card, borderRadius: t.radiusMd, padding: 16,
      border: highlight ? `1.5px solid ${t.primary}` : `1px solid ${t.border}`,
      boxShadow: "0 1px 3px rgba(0,0,0,0.03)",
      cursor: onClick ? "pointer" : "default", ...style
    }}>
      {children}
    </div>
  );
}

function PrimaryButton({ children, onClick, style = {} }) {
  const t = useTheme();
  return (
    <button onClick={onClick} style={{
      width: "100%", background: t.primary, color: "#fff", border: "none", borderRadius: t.radiusSm,
      padding: "14px 0", fontSize: 14.5, fontWeight: 700, cursor: "pointer",
      display: "flex", alignItems: "center", justifyContent: "center", gap: 6, ...style
    }}>
      {children}
    </button>
  );
}

function SecondaryButton({ children, onClick, style = {} }) {
  const t = useTheme();
  return (
    <button onClick={onClick} style={{
      width: "100%", background: "#fff", color: t.primary, border: `1.5px solid ${t.primary}`, borderRadius: t.radiusSm,
      padding: "12.5px 0", fontSize: 13.5, fontWeight: 700, cursor: "pointer", ...style
    }}>
      {children}
    </button>
  );
}

function Row({ label, value, muted }) {
  const t = useTheme();
  return (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "6.5px 0" }}>
      <span style={{ fontSize: 12.5, color: t.textSecondary }}>{label}</span>
      <span style={{ fontSize: 13.5, fontWeight: 700, color: muted ? t.textMuted : t.ink, textDecoration: muted ? "line-through" : "none" }}>{value}</span>
    </div>
  );
}

function ScreenWrap({ title, eyebrow, onBack, children }) {
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <TopBar title={title} eyebrow={eyebrow} onBack={onBack} />
      <div style={{ flex: 1, overflowY: "auto", padding: "0 18px 22px" }}>{children}</div>
    </div>
  );
}

function Divider() {
  const t = useTheme();
  return <div style={{ height: 1, background: t.border, margin: "10px 0" }} />;
}

          </div>

        </div>

        <div style={{ background: `linear-gradient(135deg, ${t.primary} 0%, ${t.primaryDark} 100%)`, borderRadius: t.radiusLg, padding: 18, marginBottom: 14, position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", right: -30, top: -30, width: 120, height: 120, borderRadius: "50%", background: "rgba(255,255,255,0.07)" }} />
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ fontSize: 10.5, color: "rgba(255,255,255,0.75)", textTransform: "uppercase", letterSpacing: 1 }}>Active Policy</div>
              <div style={{ fontSize: 17, fontWeight: 700, color: "#fff", fontFamily: t.fontDisplay, marginTop: 2 }}>Honda Activa 6G</div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.7)" }}>WB 24 AB 4521</div>
            </div>
            <Bike size={24} color="#fff" opacity={0.85} />
          </div>
          <Divider />
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <div><div style={{ fontSize: 9.5, color: "rgba(255,255,255,0.65)" }}>RENEWS IN</div><div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>10 months</div></div>
            <div><div style={{ fontSize: 9.5, color: "rgba(255,255,255,0.65)" }}>COVERAGE</div><div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>Comprehensive</div></div>
            <div><div style={{ fontSize: 9.5, color: "rgba(255,255,255,0.65)" }}>NCB</div><div style={{ fontSize: 14, fontWeight: 700, color: t.gold }}>20%</div></div>
          </div>
        </div>

        <Card onClick={() => go("instant-issuance")} style={{ marginBottom: 10, display: "flex", gap: 12, alignItems: "center" }} highlight>
          <div style={{ width: 38, height: 38, borderRadius: 10, background: t.primaryTint, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <Shield size={18} color={t.primary} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: t.ink }}>New loan? Get instant coverage</div>
            <div style={{ fontSize: 11, color: t.textMuted }}>Preview the disbursal-stage flow</div>
          </div>
          <ChevronRight size={16} color={t.textMuted} />
        </Card>

        <Card onClick={() => go("e20")} style={{ marginBottom: 16, display: "flex", gap: 12, alignItems: "flex-start" }}>
          <div style={{ width: 38, height: 38, borderRadius: 10, background: t.goldTint, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
          {[
            { id: "claim-start", icon: Camera, label: "File a Claim" },
            { id: "tripshield", icon: Zap, label: "TripShield" },
            { id: "renewal", icon: Calendar, label: "Renew Policy" },
            { id: "locator", icon: MapPin, label: "Quick Locator" },
          ].map((a) => (
            <Card key={a.id} onClick={() => go(a.id)} style={{ textAlign: "center", padding: "16px 6px" }}>
              <a.icon size={20} color={t.primary} style={{ margin: "0 auto 8px" }} />

function InstantIssuanceScreen({ go, step, setStep }) {
  const t = useTheme();
  if (step === "offer") {
    return (
      <ScreenWrap eyebrow="Loan Approved" title="Protect your new ride" onBack={() => go("home")}>
        <div style={{ textAlign: "center", padding: "8px 0 18px" }}>
          <div style={{ width: 60, height: 60, borderRadius: 16, background: t.primaryTint, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 12px" }}>
            <Shield size={28} color={t.primary} />
          </div>
          <div style={{ fontSize: 12.5, color: t.textSecondary, padding: "0 10px" }}>Get insurance for your Activa 6G in 30 seconds — pre-filled from your loan.</div>
        </div>
        <Card style={{ marginBottom: 16 }}>
          <Row label="Vehicle" value="Honda Activa 6G" />
          <Row label="Loan tenure" value="36 months" />
          <Row label="On-road value" value="₹82,400" />
        </Card>
        <PrimaryButton onClick={() => setStep("plans")}>Continue <ChevronRight size={16} /></PrimaryButton>
        <SecondaryButton onClick={() => go("home")} style={{ marginTop: 10 }}>Skip for now</SecondaryButton>
      </ScreenWrap>
    );
  }
  if (step === "plans") {
    return (
      <ScreenWrap eyebrow="Step 2 of 3" title="Choose your plan" onBack={() => setStep("offer")}>
        <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 12 }}>Explained in plain language — no jargon.</div>
        {[
          { name: "Third-Party Only", price: "₹482/yr", desc: "Legally required minimum. Covers damage you cause to others.", tag: null },
          { name: "Comprehensive", price: "₹1,340/yr", desc: "Covers your bike too — theft, accident, fire, natural events.", tag: "Popular" },
          { name: "Comprehensive + E20", price: "₹1,520/yr", desc: "Adds protection against ethanol-fuel engine damage.", tag: "Best Fit" },
        ].map((p, i) => (
          <Card key={i} style={{ marginBottom: 10 }} highlight={!!p.tag}>
            {p.tag && <Pill tone={p.tag === "Best Fit" ? "primary" : "gold"}>{p.tag}</Pill>}
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: p.tag ? 8 : 0 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: t.ink }}>{p.name}</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: t.primary }}>{p.price}</div>
            </div>
            <div style={{ fontSize: 11.5, color: t.textMuted, marginTop: 4 }}>{p.desc}</div>
          </Card>
        ))}
        <PrimaryButton onClick={() => setStep("payment")} style={{ marginTop: 6 }}>Select Comprehensive + E20 <ChevronRight size={16} /></PrimaryButton>
      </ScreenWrap>
    );
  }
  if (step === "payment") {
    return (
      <ScreenWrap eyebrow="Step 3 of 3" title="Payment" onBack={() => setStep("plans")}>
        <Card style={{ marginBottom: 14 }}>
          <Row label="Plan" value="Comprehensive + E20" />
          <Row label="Annual premium" value="₹1,520" />
        </Card>
        <div style={{ fontSize: 12.5, fontWeight: 700, color: t.ink, marginBottom: 8 }}>How would you like to pay?</div>
        <Card style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 10 }} highlight>
          <Wallet size={20} color={t.primary} />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: t.ink }}>Bundle into EMI</div>
            <div style={{ fontSize: 11, color: t.textMuted }}>+₹127/month added to your loan EMI</div>
          </div>
        </Card>
        <Card style={{ marginBottom: 18, display: "flex", alignItems: "center", gap: 10 }}>
          <Wallet size={20} color={t.textMuted} />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: t.ink }}>Pay upfront</div>
            <div style={{ fontSize: 11, color: t.textMuted }}>₹1,520 one-time</div>
          </div>
        </Card>
        <PrimaryButton onClick={() => setStep("done")}>Confirm & Pay</PrimaryButton>
      </ScreenWrap>
    );
  }
  return (
    <ScreenWrap title="" onBack={null}>
      <div style={{ textAlign: "center", padding: "56px 10px" }}>
        <div style={{ width: 72, height: 72, borderRadius: 20, background: t.successTint, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
          <CheckCircle2 size={36} color={t.success} />
        </div>
        <div style={{ fontSize: 18, fontWeight: 700, color: t.ink, fontFamily: t.fontDisplay }}>You're protected</div>
        <div style={{ fontSize: 12.5, color: t.textMuted, marginTop: 8 }}>Your policy is active and added to your dashboard.</div>
        <PrimaryButton onClick={() => { setStep("offer"); go("home"); }} style={{ marginTop: 24 }}>Go to Dashboard</PrimaryButton>
      </div>
    </ScreenWrap>
  );
}

function ClaimScreen({ go, step, setStep }) {
  const t = useTheme();
  if (step === "start") {
    return (
      <ScreenWrap eyebrow="New Claim" title="File a claim" onBack={() => go("home")}>
        <div style={{ fontSize: 12.5, color: t.textMuted, marginBottom: 14 }}>Select your vehicle and what happened.</div>
        <Card style={{ marginBottom: 14, display: "flex", alignItems: "center", gap: 10 }} highlight>
          <Bike size={20} color={t.primary} />
          <div style={{ fontSize: 13, fontWeight: 700, color: t.ink }}>Honda Activa 6G — WB 24 AB 4521</div>

          {["Accident", "Theft", "Monsoon Damage", "Other"].map((tp) => (
            <Card key={tp} onClick={() => setStep("inspection")} style={{ textAlign: "center", fontSize: 12, fontWeight: 700, color: t.ink, padding: "14px 6px" }}>{tp}</Card>
          ))}
        </div>

    );

  if (step === "inspection") {
    return (
      <ScreenWrap eyebrow="Step 2" title="Choose inspection type" onBack={() => setStep("start")}>

          <Video size={22} color={t.primary} />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: t.ink }}>Live Video Inspection</div>
            <div style={{ fontSize: 11, color: t.textMuted }}>Fastest — settle in as little as 24 hours</div>
          </div>
          <ChevronRight size={16} color={t.textMuted} />
        </Card>
        <Card onClick={() => setStep("garage")} style={{ display: "flex", gap: 12, alignItems: "center" }}>

function RideGuardPrototype() {
  const [screen, setScreen] = useState("home");
  const [issuanceStep, setIssuanceStep] = useState("offer");
  const [claimStep, setClaimStep] = useState("start");

  const go = (target) => {
    if (target === "claim-start") { setClaimStep("start"); setScreen("claim"); return; }
    if (target === "instant-issuance") { setIssuanceStep("offer"); setScreen("instant-issuance"); return; }
    setScreen(target);
  };

  let content;
  let navActive = "home";
  switch (screen) {
    case "home": content = <HomeScreen go={go} />; break;
    case "instant-issuance": content = <InstantIssuanceScreen go={go} step={issuanceStep} setStep={setIssuanceStep} />; break;
    case "claim": content = <ClaimScreen go={go} step={claimStep} setStep={setClaimStep} />; navActive = "claims"; break;
    case "renewal": content = <RenewalScreen go={go} />; break;
    case "tripshield": content = <TripShieldScreen go={go} />; break;
    case "locator": content = <LocatorScreen go={go} />; navActive = "locator"; break;
    case "vault": content = <VaultScreen go={go} />; navActive = "vault"; break;
    case "rewards": content = <RewardsScreen go={go} />; break;
    case "e20": content = <E20Screen go={go} />; break;
    case "profile": content = <ProfileScreen />; navActive = "profile"; break;
    default: content = <HomeScreen go={go} />;
  }

  const showNav = ["home", "locator", "vault", "profile"].includes(screen) || (screen === "claim" && claimStep === "tracker");

  return (
    <ThemeCtx.Provider value={theme}>
      <div style={{ width: "100%", height: "100%", fontFamily: theme.fontBody }}>
        <PhoneFrame>
          <StatusBar />
          {content}
          {showNav && <BottomNav active={navActive} go={go} />}
        </PhoneFrame>
      </div>
    </ThemeCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
